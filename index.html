<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Forge Release Notes</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101010;
      --panel: #171717;
      --panel-strong: #1f1f1f;
      --text: #f4f1ec;
      --muted: #a9a29a;
      --accent: #ff8500;
      --line: #303030;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 0%, rgba(255, 133, 0, .18), transparent 34%),
        linear-gradient(135deg, #101010, #15120f 48%, #101010);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      display: grid;
      grid-template-columns: 220px minmax(0, 820px);
      gap: 28px;
      max-width: 1120px;
      margin: 0 auto;
      padding: 46px 22px 68px;
    }

    aside,
    article {
      border: 1px solid var(--line);
      background: rgba(23, 23, 23, .86);
      box-shadow: 0 24px 80px rgba(0, 0, 0, .26);
    }

    aside {
      position: sticky;
      top: 22px;
      align-self: start;
      border-radius: 10px;
      padding: 18px;
    }

    article {
      min-height: 560px;
      border-radius: 14px;
      padding: clamp(26px, 5vw, 44px);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(38px, 6vw, 64px);
      line-height: .98;
      letter-spacing: 0;
    }

    h2 {
      margin: 34px 0 12px;
      color: var(--accent);
      font-size: 13px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.68;
    }

    ul {
      margin: 0 0 12px;
      padding-left: 20px;
    }

    li {
      margin: 8px 0;
      line-height: 1.58;
    }

    code {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0b0b0b;
      padding: 2px 5px;
      color: var(--text);
    }

    .versionList {
      display: grid;
      gap: 8px;
      margin-top: 16px;
    }

    .versionLink {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-strong);
      color: var(--muted);
      padding: 10px 12px;
      text-decoration: none;
    }

    .versionLink:hover,
    .versionLink.active {
      border-color: rgba(255, 133, 0, .72);
      color: var(--accent);
    }

    .rawLink {
      display: inline-flex;
      margin-top: 24px;
      color: var(--accent);
      text-decoration: none;
    }

    .rawLink:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 760px) {
      main {
        grid-template-columns: 1fr;
        padding-top: 24px;
      }

      aside {
        position: static;
      }

      .versionList {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>
<body>
  <main>
    <aside>
      <p class="eyebrow">The Forge</p>
      <h2>Release Notes</h2>
      <nav class="versionList" id="versions" aria-label="Versions"></nav>
      <footer>Unofficial Blender utility by Unkredible Studios.</footer>
    </aside>

    <article id="content" aria-live="polite">
      <p>Loading release notes...</p>
    </article>
  </main>

  <script>
    const versions = ["1.0.7", "1.0.6", "1.0.5", "1.0.4", "1.0.3", "1.0.2", "1.0.1", "1.0.0"];
    const params = new URLSearchParams(window.location.search);
    const selectedVersion = versions.includes(params.get("version")) ? params.get("version") : versions[0];
    const versionsNode = document.getElementById("versions");
    const contentNode = document.getElementById("content");

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function renderMarkdown(markdown) {
      const output = [];
      let listOpen = false;

      for (const line of markdown.split("\n")) {
        if (line.startsWith("- ")) {
          if (!listOpen) {
            output.push("<ul>");
            listOpen = true;
          }
          output.push(`<li>${escapeHtml(line.slice(2))}</li>`);
          continue;
        }

        if (listOpen) {
          output.push("</ul>");
          listOpen = false;
        }

        if (line.startsWith("# ")) {
          output.push(`<h1>${escapeHtml(line.slice(2))}</h1>`);
        } else if (line.startsWith("## ")) {
          output.push(`<h2>${escapeHtml(line.slice(3))}</h2>`);
        } else if (line.trim()) {
          output.push(`<p>${escapeHtml(line)}</p>`);
        }
      }

      if (listOpen) {
        output.push("</ul>");
      }

      return output.join("");
    }

    versionsNode.innerHTML = versions
      .map((version) => {
        const active = version === selectedVersion ? " active" : "";
        return `<a class="versionLink${active}" href="?version=${version}">v${version}</a>`;
      })
      .join("");

    fetch(`v${selectedVersion}.md`)
      .then((response) => {
        if (!response.ok) {
          throw new Error("Release note not found.");
        }
        return response.text();
      })
      .then((markdown) => {
        contentNode.innerHTML = `${renderMarkdown(markdown)}<a class="rawLink" href="v${selectedVersion}.md">Open Markdown</a>`;
      })
      .catch(() => {
        contentNode.innerHTML = "<h1>Release notes unavailable</h1><p>Try again later.</p>";
      });
  </script>
</body>
</html>
